<html lang="ja">
<head>

  <title>クライミングエリア 天気</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f0f4f8;
      color: #333;
      padding: 1.5rem 1rem;
    }

    #app { max-width: 960px; margin: 0 auto; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 1rem; }

    .api-note {
      font-size: 12px;
      color: #4a8a4a;
      background: #f0fff0;
      border: 1px solid #b2ddb2;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 1.25rem;
    }

    #btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
      align-items: center;
    }

    #load-btn {
      padding: 9px 24px;
      font-size: 14px;
      font-weight: 500;
      background: #378ADD;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #load-btn:hover { background: #2a6fb5; }
    #load-btn:active { transform: scale(0.98); }
    #load-btn:disabled { background: #aac8e8; cursor: default; }
    #last-updated { font-size: 12px; color: #aaa; margin-left: auto; }

    .region-label {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.05em;
      margin: 1.5rem 0 0.6rem;
    }

    .area-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    /* カードヘッダー（現在天気） */
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      cursor: pointer;
      user-select: none;
    }
    .card-header:hover { background: #f9f9f9; }
    .card-name    { font-size: 15px; font-weight: 600; min-width: 88px; }
    .card-pref    { font-size: 11px; color: #aaa; min-width: 58px; }
    .card-icon    { font-size: 22px; }
    .card-temp    { font-size: 20px; font-weight: 700; color: #378ADD; min-width: 54px; }
    .card-desc    { font-size: 13px; color: #666; flex: 1; }
    .card-humidity { font-size: 13px; color: #5c9dd8; min-width: 58px; }
    .card-wind    { font-size: 13px; color: #888; min-width: 68px; }
    .card-precip  { font-size: 13px; color: #4a90d9; min-width: 54px; }
    .card-toggle  { font-size: 12px; color: #bbb; white-space: nowrap; }
    .card-status  { font-size: 13px; color: #bbb; }
    .card-error   { color: #e24b4a; }

    /* 予報セクション */
    .forecast-section {
      display: none;
      border-top: 1px solid #f0f0f0;
    }
    .forecast-section.open { display: block; }

    /* 日別テーブル */
    .forecast-title {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      padding: 12px 16px 6px;
    }

    .forecast-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .forecast-table th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      padding: 4px 8px 6px;
      border-bottom: 1px solid #f0f0f0;
      white-space: nowrap;
    }
    .forecast-table td {
      padding: 0;
      border-bottom: 1px solid #f7f7f7;
      vertical-align: middle;
    }
    .forecast-table tr:last-child td { border-bottom: none; }

    /* 日付セル（クリックで時間帯展開） */
    .day-row-main {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      cursor: pointer;
      user-select: none;
    }
    .day-row-main:hover { background: #fafafa; }

    /* 土日カラー */
    .day-sat { background: #eef4ff; }
    .day-sat:hover { background: #e4ecff !important; }
    .day-sun { background: #fff3f3; }
    .day-sun:hover { background: #ffe8e8 !important; }
    .day-sat .fc-date { color: #3a6dd8; font-weight: 600; }
    .day-sun .fc-date { color: #d84a4a; font-weight: 600; }

    .fc-date     { min-width: 82px; font-size: 13px; color: #555; }
    .fc-icon     { font-size: 17px; min-width: 24px; }
    .fc-desc     { color: #666; min-width: 70px; font-size: 12px; }
    .fc-max      { font-weight: 600; color: #e07b39; min-width: 30px; }
    .fc-min      { color: #5c9dd8; min-width: 30px; }
    .fc-sep      { color: #ccc; }

    .hum-wrap    { display: flex; align-items: center; gap: 5px; min-width: 100px; }
    .hum-val     { color: #5c9dd8; font-size: 12px; min-width: 34px; }
    .hum-bar     { height: 5px; border-radius: 3px; background: #e8f0fb; width: 55px; overflow: hidden; }
    .hum-fill    { height: 100%; border-radius: 3px; background: #378ADD; }

    .prob-wrap   { display: flex; align-items: center; gap: 5px; min-width: 80px; }
    .prob-val    { color: #4a90d9; font-size: 12px; min-width: 30px; }
    .prob-bar    { height: 5px; border-radius: 3px; background: #e8f0fb; width: 45px; overflow: hidden; }
    .prob-fill   { height: 100%; border-radius: 3px; background: #4a90d9; }

    .fc-wind-val { color: #888; font-size: 12px; min-width: 60px; }
    .day-toggle  { font-size: 11px; color: #ccc; margin-left: auto; }

    /* 時間帯サブ行 */
    .hourly-rows { display: none; background: #f8fafd; border-top: 1px solid #eef2f8; }
    .hourly-rows.open { display: block; }

    .hourly-title {

      width: 100%;
      border-collapse: collapse;

      font-size: 10px;

      color: #bbb;
      text-align: left;

    @media (max-width: 600px) {
      .card-desc, .card-wind, .card-precip { display: none; }

    }

<script>
    function judgeClimbability(cur) {
  if (cur.precip > 0) {
    return { text: '❌ 無理', color: '#ef4444' };
  }

  if (cur.humidity >= 80) {
    return { text: '❌ 無理', color: '#ef4444' };
  }

  if (cur.humidity >= 60) {
    return { text: '⚠ 微妙', color: '#f59e0b' };
  }

  if (cur.wind >= 8) {
    return { text: '⚠ 風強い', color: '#f59e0b' };
  }

  if (cur.temp >= 35) {
    return { text: '⚠ 暑すぎ', color: '#f97316' };
  }

  return { text: '✅ 登れる', color: '#10b981' };
}
  var REGIONS = [
    {
      region: '関東',
      areas: [
        { name: '御嶽駅',     pref: '東京都',   lat: 35.7900, lon: 139.1550 },

        { name: '瑞牆山',     pref: '山梨県',   lat: 35.8580, lon: 138.5490 },
        { name: '二子山',     pref: '埼玉県',   lat: 36.0640, lon: 138.7720 },

      areas: [
        { name: '塩原',      pref: '栃木県', lat: 36.9300, lon: 139.8500 },
        { name: '三峰川',    pref: '長野県', lat: 35.6900, lon: 138.0900 },
        { name: '鳳来寺山',  pref: '愛知県', lat: 34.9490, lon: 137.5890 },
      ]
    },
   {
      region: '中部・関西',
      areas: [
        { name: '恵那',      pref: '岐阜県', lat: 35.4490, lon: 137.4110 },
        { name: '笠置山',    pref: '岐阜県', lat: 35.4100, lon: 137.2730 },
        { name: '下呂（飛騨金山）', pref: '岐阜県', lat: 35.5930, lon: 137.2100 }, // ← 追加
        { name: '六甲山',    pref: '兵庫県', lat: 34.7730, lon: 135.2490 },
      ]
    },
    {
      region: '中国・四国・九州',
      areas: [
        { name: '帝釈峡',       pref: '広島県', lat: 34.9580, lon: 133.2320 },
        { name: '大分・耶馬溪', pref: '大分県', lat: 33.3880, lon: 131.2090 },

    },

  var DOW = ['日','月','火','水','木','金','土'];

function wmoToInfo(code) {
    // 環境依存しにくい基本絵文字のみ使用
    if (code === 0)               return { icon: '☀',  desc: '快晴' };
    if (code === 1)               return { icon: '☀',  desc: 'ほぼ晴れ' };   // 🌤 → ☀
    if (code === 2)               return { icon: '☁',  desc: '一部曇り' };   // ⛅ → ☁
    if (code === 3)               return { icon: '☁',  desc: '曇り' };
    if (code >= 45 && code <= 48) return { icon: '〰', desc: '霧' };         // 🌫 → 〰
    if (code >= 51 && code <= 55) return { icon: '🌂', desc: '霧雨' };       // 🌦 → 🌂
    if (code >= 61 && code <= 65) return { icon: '☔', desc: '雨' };
    if (code >= 71 && code <= 77) return { icon: '❄',  desc: '雪' };
    if (code >= 80 && code <= 82) return { icon: '☔', desc: 'にわか雨' };   // 🌧 → ☔
    if (code >= 85 && code <= 86) return { icon: '❄',  desc: 'にわか雪' };  // 🌨 → ❄
    if (code >= 95 && code <= 99) return { icon: '⚡', desc: '雷雨' };       // ⛈ → ⚡
    return { icon: '?', desc: '不明' };
  }

  function fmtDate(dateStr) {
    var d = new Date(dateStr + 'T00:00:00');
    return (d.getMonth()+1) + '/' + d.getDate() + '（' + DOW[d.getDay()] + '）';
  }

  function getDow(dateStr) {
    return new Date(dateStr + 'T00:00:00').getDay();
  }

// -----------------------------------------------
  // リトライ付きfetch（429エラー対策）
  // -----------------------------------------------
  async function fetchWithRetry(url, retries, delayMs) {
    for (var attempt = 0; attempt <= retries; attempt++) {
      try {
        var res = await fetch(url);

        // 429 Too Many Requests → 待ってリトライ
        if (res.status === 429) {
          if (attempt < retries) {
            await sleep(delayMs * (attempt + 1)); // 待ち時間を少しずつ増やす
            continue;
          } else {
            return { error: 'リクエスト過多。しばらく待って再取得してください。' };
          }
        }

        var data = await res.json();
        if (!res.ok || data.error) return { error: data.reason || 'APIエラー' };
        return data;

      } catch(e) {
        if (attempt < retries) {
          await sleep(delayMs);
        } else {
          return { error: '通信エラー' };
        }
      }
    }
  }

  function sleep(ms) {
    return new Promise(function(resolve) { setTimeout(resolve, ms); });
  }

  // -----------------------------------------------
  // Open-Meteo API 取得（fetchWithRetry版）
  // -----------------------------------------------
  async function fetchArea(area) {
    var params = [
      'latitude='  + area.lat,
      'longitude=' + area.lon,
      'timezone=Asia/Tokyo',
      'forecast_days=16',
      'wind_speed_unit=ms',   // ← 追加：m/s で返してもらう
      'current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code,precipitation',
      'daily=weather_code,temperature_2m_max,temperature_2m_min,' +
        'relative_humidity_2m_max,relative_humidity_2m_min,' +
        'precipitation_sum,precipitation_probability_max,wind_speed_10m_max',
      'hourly=temperature_2m,relative_humidity_2m,precipitation_probability,' +
        'precipitation,weather_code,wind_speed_10m',
    ].join('&');

    var url  = 'https://api.open-meteo.com/v1/forecast?' + params;
    var data = await fetchWithRetry(url, 3, 1000); // 最大3回リトライ、1秒待ち
    if (data.error) return { error: data.error };

    var c = data.current;
    var d = data.daily;
    var h = data.hourly;

    var hourlyByDate = {};
    h.time.forEach(function(t, i) {
      var dateKey = t.slice(0, 10);
      var hhmm    = t.slice(11, 16);
      if (!hourlyByDate[dateKey]) hourlyByDate[dateKey] = [];
      hourlyByDate[dateKey].push({
        time:   hhmm,
        temp:   Math.round(h.temperature_2m[i]),
        hum:    h.relative_humidity_2m[i],
        prob:   h.precipitation_probability[i],
        precip: h.precipitation[i] != null ? h.precipitation[i].toFixed(1) : '0.0',
        wmo:    h.weather_code[i],
        wind:   h.wind_speed_10m[i] != null ? h.wind_speed_10m[i].toFixed(1) : '—',
      });
    });

    var days = d.time.map(function(date, i) {
      var humAvg = Math.round(
        (d.relative_humidity_2m_max[i] + d.relative_humidity_2m_min[i]) / 2
      );
      return {
        date:       date,
        wmo:        d.weather_code[i],
        tempMax:    Math.round(d.temperature_2m_max[i]),
        tempMin:    Math.round(d.temperature_2m_min[i]),
        humidity:   humAvg,
        precip:     d.precipitation_sum[i] != null ? d.precipitation_sum[i].toFixed(1) : '—',
        precipProb: d.precipitation_probability_max[i] != null ? d.precipitation_probability_max[i] : null,
        wind:       d.wind_speed_10m_max[i] != null ? d.wind_speed_10m_max[i].toFixed(1) : '—',
        hourly:     hourlyByDate[date] || [],
      };
    });

    return {
      current: {
        temp:     Math.round(c.temperature_2m),
        humidity: c.relative_humidity_2m,
        wind:     c.wind_speed_10m.toFixed(1),
        precip:   c.precipitation,
        wmo:      c.weather_code,
      },
      days: days,
    };
  }

  // -----------------------------------------------
  // 全エリア取得（同時リクエスト数を制限）
  // -----------------------------------------------

  // 最大CONCURRENCY件ずつ順番に処理する
  async function limitedParallel(tasks, concurrency) {
    var results = new Array(tasks.length);
    var index   = 0;

    async function worker() {
      while (index < tasks.length) {
        var i = index++;
        results[i] = await tasks[i]();
      }
    }

    // concurrency数だけworkerを同時に走らせる
    var workers = [];
    for (var w = 0; w < concurrency; w++) {
      workers.push(worker());
    }
    await Promise.all(workers);
    return results;
  }

  async function loadAll() {
    var btn = document.getElementById('load-btn');
    btn.disabled = true;
    btn.textContent = '取得中...';

    var loading = REGIONS.map(function(r) {
      return r.areas.map(function() { return { loading: true }; });
    });
    renderAll(loading);

    // 全エリアをフラットなタスク配列に変換
    var tasks = [];
    REGIONS.forEach(function(regionData, rIdx) {
      regionData.areas.forEach(function(area, aIdx) {
        tasks.push({ rIdx: rIdx, aIdx: aIdx, area: area });
      });
    });

    // 同時リクエスト数を3に制限して取得
    var flatResults = await limitedParallel(
      tasks.map(function(t) {
        return function() { return fetchArea(t.area); };
      }),
      3  // ← 同時リクエスト数の上限（増やすとまた429が出る可能性あり）
    );

    // 結果をREGIONSの構造に戻す
    var allResults = REGIONS.map(function(r) {
      return r.areas.map(function() { return null; });
    });
    tasks.forEach(function(t, i) {
      allResults[t.rIdx][t.aIdx] = flatResults[i];
    });

    renderAll(allResults);

    var now = new Date();
    document.getElementById('last-updated').textContent =
      '更新: ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
    btn.disabled = false;
    btn.textContent = '登りたい';
  }

  // -----------------------------------------------
  // 描画
  // -----------------------------------------------
  var openCards   = {};  // エリアカードの展開状態
  var openHourly  = {};  // 時間帯行の展開状態

  function toggleCard(cardId) {
    openCards[cardId] = !openCards[cardId];
    var sec = document.getElementById('fc-'  + cardId);
    var tog = document.getElementById('tog-' + cardId);
    if (sec) sec.classList.toggle('open', openCards[cardId]);
    if (tog) tog.textContent = openCards[cardId] ? '▲ 閉じる' : '▼ 予報を見る';
  }

  function toggleHourly(hid) {
    openHourly[hid] = !openHourly[hid];
    var row = document.getElementById('h-' + hid);
    var tog = document.getElementById('ht-' + hid);
    if (row) row.classList.toggle('open', openHourly[hid]);
    if (tog) tog.textContent = openHourly[hid] ? '▲' : '▼';
  }

  function buildDayRows(days, cardId) {
    return days.map(function(day, di) {
      var dow  = getDow(day.date);
      var info = wmoToInfo(day.wmo);
      var hid  = cardId + '-' + di;

      var dowClass = dow === 6 ? 'day-sat' : dow === 0 ? 'day-sun' : '';

      var humPct  = day.humidity + '%';
      var probPct = day.precipProb != null ? day.precipProb + '%' : '—';
      var probFill = day.precipProb != null ? day.precipProb + '%' : '0%';

      // 時間帯行（3時間ごとに絞る）
      var hourlyFiltered = day.hourly.filter(function(h) {
        var hr = parseInt(h.time.slice(0, 2));
        return hr % 3 === 0;
      });

      var hourlyRows = hourlyFiltered.map(function(h) {
        var hi = wmoToInfo(h.wmo);
        return '<tr>' +
          '<td class="h-time">'  + h.time  + '</td>' +
          '<td class="h-icon">'  + hi.icon + '</td>' +
          '<td class="h-temp">'  + h.temp  + '°C</td>' +
          '<td class="h-hum">💧 ' + h.hum + '%</td>' +
          '<td class="h-prob">🌧 ' + (h.prob != null ? h.prob + '%' : '—') + '</td>' +
          '<td class="h-precip">' + h.precip + 'mm</td>' +
          '<td class="h-wind">💨 ' + h.wind + 'm/s</td>' +
        '</tr>';
      }).join('');

      var hourlyHtml =
        '<div class="hourly-rows' + (openHourly[hid] ? ' open' : '') + '" id="h-' + hid + '">' +
          '<p class="hourly-title">時間帯別（3時間ごと）</p>' +
          '<table class="hourly-table">' +
            '<thead><tr>' +
              '<th>時刻</th><th></th><th>気温</th><th>湿度</th><th>降水確率</th><th>降水量</th><th>風速</th>' +
            '</tr></thead>' +
            '<tbody>' + hourlyRows + '</tbody>' +
          '</table>' +
        '</div>';

      var mainRow =
        '<div class="day-row-main ' + dowClass + '" onclick="toggleHourly(\'' + hid + '\')">' +
          '<span class="fc-date">' + fmtDate(day.date) + '</span>' +
          '<span class="fc-icon">' + info.icon + '</span>' +
          '<span class="fc-desc">' + info.desc + '</span>' +
          '<span class="fc-max">'  + day.tempMax + '°</span>' +
          '<span class="fc-sep">/ </span>' +
          '<span class="fc-min">'  + day.tempMin + '°</span>' +
          '<span class="hum-wrap">' +
            '<span class="hum-val">' + humPct + '</span>' +
            '<div class="hum-bar"><div class="hum-fill" style="width:' + humPct + '"></div></div>' +
          '</span>' +
          '<span class="prob-wrap">' +
            '<span class="prob-val">' + probPct + '</span>' +
            '<div class="prob-bar"><div class="prob-fill" style="width:' + probFill + '"></div></div>' +
          '</span>' +
          '<span class="fc-wind-val">💨 ' + day.wind + 'm/s</span>' +
          '<span class="day-toggle" id="ht-' + hid + '">' + (openHourly[hid] ? '▲' : '▼') + '</span>' +
        '</div>';

      return '<td colspan="8" style="padding:0;">' + mainRow + hourlyHtml + '</td>';
    }).map(function(td) {
      return '<tr>' + td + '</tr>';
    }).join('');
  }

  function renderAll(allResults) {
    var container = document.getElementById('areas-container');
    container.innerHTML = '';

    REGIONS.forEach(function(regionData, rIdx) {
      var label = document.createElement('p');
      label.className = 'region-label';
      label.textContent = regionData.region;
      container.appendChild(label);

      regionData.areas.forEach(function(area, aIdx) {
        var cardId = rIdx + '-' + aIdx;
        var result = allResults[rIdx] ? allResults[rIdx][aIdx] : null;

        var card = document.createElement('div');
        card.className = 'area-card';

        // ヘッダー（現在天気）
        var hdr = document.createElement('div');
        hdr.className = 'card-header';
        hdr.onclick = function() { toggleCard(cardId); };

        if (!result) {
          hdr.innerHTML =
            '<span class="card-name">' + area.name + '</span>' +
            '<span class="card-pref">' + area.pref + '</span>' +
            '<span class="card-status">ボタンを押して取得</span>';
        } else if (result.loading) {
          hdr.innerHTML =
            '<span class="card-name">' + area.name + '</span>' +
            '<span class="card-pref">' + area.pref + '</span>' +
            '<span class="card-status">読み込み中...</span>';
        } else if (result.error) {
          hdr.innerHTML =
            '<span class="card-name">' + area.name + '</span>' +
            '<span class="card-pref">' + area.pref + '</span>' +
            '<span class="card-status card-error">' + result.error + '</span>';
        } else {
          var cur  = result.current;
          var judge = judgeClimbability(cur);
          var info = wmoToInfo(cur.wmo);
          hdr.innerHTML =
            '<span class="card-name">'     + area.name         + '</span>' +
            '<span class="card-pref">'     + area.pref         + '</span>' +
            '<span class="card-icon">'     + info.icon         + '</span>' +
            '<span class="card-temp">'     + cur.temp + '°C'  + '</span>' +
            '<span class="card-judge" style="background:' + judge.color + '20; color:' + judge.color + ';">' + judge.text + '</span>' +
            '<span class="card-desc">'     + info.desc         + '</span>' +
            '<span class="card-humidity">💧 ' + cur.humidity + '%</span>' +
            '<span class="card-wind">💨 '  + cur.wind + 'm/s' + '</span>' +
            '<span class="card-precip">🌧 ' + cur.precip + 'mm</span>' +
            '<span class="card-toggle" id="tog-' + cardId + '">' +
              (openCards[cardId] ? '▲ 閉じる' : '▼ 予報を見る') +
            '</span>';
        }
        card.appendChild(hdr);

        // 予報セクション
        var sec = document.createElement('div');
        sec.className = 'forecast-section' + (openCards[cardId] ? ' open' : '');
        sec.id = 'fc-' + cardId;

        if (result && result.days) {
          sec.innerHTML =
            '<p class="forecast-title">16日間予報 — 行をクリックすると時間帯別を展開</p>' +
            '<table class="forecast-table">' +
              '<thead><tr>' +
                '<th colspan="8" style="padding:4px 8px 6px;">日付 / 天気 / 最高・最低 / 湿度 / 降水確率 / 最大風速</th>' +
              '</tr></thead>' +
              '<tbody>' + buildDayRows(result.days, cardId) + '</tbody>' +
            '</table>';
        } else if (result && result.error) {
          sec.innerHTML = '<p style="padding:12px 16px;font-size:13px;color:#e24b4a;">' + result.error + '</p>';
        }

        card.appendChild(sec);
        container.appendChild(card);
      });
    });
  }

  

  renderAll(REGIONS.map(function(r) {
    return r.areas.map(function() { return null; });
  }));
</script>
</body>
</html>
